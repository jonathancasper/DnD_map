<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa DM</title>
	<script type="text/javascript" src="/eel.js"></script>
	<link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
</head>
<body class="dm">
    <div id="map-container">
        <div id="fog-brush-indicator"></div>
        <div id="map-wrapper">
            <canvas id="fog-of-war"></canvas>
        </div>
        <canvas id="grid"></canvas>
    </div>
	
    <!-- Drop new map file (hidden, used by modal) -->
    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <div id="drag-drop-area">
		Przeciągnij plik tutaj, aby wgrać mapę
	</div>
	
	<!-- HUD - Right Side -->
    <div id="right-hud" class="hud">
		<div id="tool-selection">
			<div class="radio-button" title="Pan/Scroll mode">
				<input type="radio" id="pan-tool" name="tool" value="pan" checked="checked">
				<label for="pan-tool">Pan Tool</label>
			</div>
			<div class="radio-button" title="Brush mode">
				<input type="radio" id="fog-tool" name="tool" value="fog">
				<label for="fog-tool">Fog Tool</label>
			</div>
			<div class="radio-button" title="Token mode">
				<input type="radio" id="token-tool" name="tool" value="token">
				<label for="token-tool">Token Tool</label>
			</div>
		</div>
	</div>

	<div id="right-side-container">
		<div id="brush-size-control" class="hidden">
			<input type="range" id="brush-size-slider" min="5" max="100" value="20" title="Changes the brush size">
			<input type="number" id="brush-size-input" min="5" max="100" value="20" title="Changes the brush size">
            <input type="color" id="brush-color" value="#111111" title="Sets color for brush">
		</div>

        <div id="token-customization" class="hidden">
            <input type="color" id="token-color" value="#ff0000" title="Sets color for new token">
			<input type="number" id="token-size-input" min="5" max="50" value="20" title="Sets size for new token">
        </div>
    </div>

    <!-- HUD - Left Side -->
    <div id="left-hud" class="hud">
        <label class="checkbox-container" title="Syncs pan/zoom to players view">
			Sync to Players
            <input type="checkbox" id="checkbox-1">
            <span class="checkmark"></span>
        </label>
        <label class="checkbox-container" title="Checkbox 2 Functionality">
			Checkbox 2
            <input type="checkbox" id="checkbox-2">
            <span class="checkmark"></span>
        </label>
        <label class="checkbox-container" title="Checkbox 3 Functionality">
			Checkbox 3
            <input type="checkbox" id="checkbox-3">
            <span class="checkmark"></span>
        </label>
    </div>

    <!-- HUD - Bottom Right -->
    <div id="bottom-right-hud" class="hud" title="Changes the zoom">
        <label for="map-scale">Map Scale:</label>
        <input type="number" id="map-scale" min="10" max="300" value="100">
		<label for="map-scale">%</label>
    </div>

    <!-- HUD - Top Left -->
    <div id="top-left-hud" class="hud">
        <div id="reset-view" title="Reset view to default position and zoom">Reset View</div>
        <div id="change-map-btn" title="Select or create a profile">Change Map</div>
        <div id="reset-fog" title="Resets the fog">Reset Fog</div>
		<div id="open-players" title="Opens new window with players view">Open Players Map</div>
		<div id="quit-btn" title="Save state and quit">Quit</div>
    </div>

    <div class="hidden">
        <input id="originX" value="0">
        <input id="originY" value="0">
        <input id="grid-size" value="50">
    </div>

    <!-- Profile Selection Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2>Select or Create Profile</h2>
            
            <div class="modal-section">
                <h3>Existing Profiles</h3>
                <select id="profile-select">
                    <option value="">-- Select a profile --</option>
                </select>
                <div class="button-row">
                    <button id="load-profile-btn">Load</button>
                    <button id="delete-profile-btn" class="danger">Delete</button>
                </div>
            </div>
            
            <div class="modal-divider">OR</div>
            
            <div class="modal-section">
                <h3>Create New Profile</h3>
                <label for="new-map-file">Map Image:</label>
                <input type="file" id="new-map-file" accept="image/*">
                <label for="new-profile-name">Profile Name:</label>
                <input type="text" id="new-profile-name" placeholder="Enter profile name">
                <button id="create-profile-btn">Create Profile</button>
            </div>
            
            <div id="migration-section" class="modal-section hidden">
                <div class="modal-divider">OR</div>
                <h3>Migrate Old Data</h3>
                <p>You have existing map data. Would you like to migrate it to a new profile?</p>
                <label for="migrate-profile-name">Profile Name:</label>
                <input type="text" id="migrate-profile-name" placeholder="Enter profile name for migration">
                <button id="migrate-btn">Migrate</button>
            </div>
        </div>
    </div>

    <script src="js/dm.js"></script>
</body>
</html>
